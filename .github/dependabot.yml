version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: all
    ignore:
      # registry:3 (distribution v3) breaks pull-through proxy for OCI index
      # child manifests — serves cached index but 404s on digest lookups for
      # children not yet fetched. See lucos_docker_mirror#35.
      - dependency-name: "registry"
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]

  - package-ecosystem: "docker"
    directory: "/./info"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: all
    ignore:
      - dependency-name: "python"
        versions:
          - "*.pre.alpine.a"   # alpha (e.g. 3.15.0a2-alpine)
          - "*.pre.alpine.b"   # beta  (e.g. 3.15.0b2-alpine)
          - "*.pre.alpine.rc*" # rc    (e.g. 3.15.0rc1-alpine)
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
